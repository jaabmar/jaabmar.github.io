{% if jekyll.environment == "production" and site.google_analytics %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "{{ site.google_analytics }}");

    (function () {
      var scrollThresholds = [25, 50, 75, 90, 100];
      var sentScrollDepths = {};
      var sentSections = {};

      function cleanText(value) {
        return (value || "").replace(/\s+/g, " ").trim().slice(0, 140);
      }

      function hostFromUrl(url) {
        try {
          return new URL(url, window.location.href).hostname.replace(/^www\./, "");
        } catch (error) {
          return "";
        }
      }

      function sendEvent(name, params) {
        if (typeof gtag !== "function") {
          return;
        }

        gtag("event", name, params || {});
      }

      function sendUtmLanding() {
        var params = new URLSearchParams(window.location.search);
        var hasUtm = ["utm_source", "utm_medium", "utm_campaign", "utm_content", "utm_term"].some(function (key) {
          return params.has(key);
        });

        if (!hasUtm) {
          return;
        }

        sendEvent("utm_landing", {
          utm_source: params.get("utm_source") || "",
          utm_medium: params.get("utm_medium") || "",
          utm_campaign: params.get("utm_campaign") || "",
          utm_content: params.get("utm_content") || "",
          utm_term: params.get("utm_term") || "",
          landing_path: window.location.pathname,
          landing_url: window.location.href,
          referrer_domain: document.referrer ? hostFromUrl(document.referrer) : "",
          transport_type: "beacon"
        });
      }

      function trackCvClick(event) {
        var link = event.target.closest ? event.target.closest("a") : null;

        if (!link) {
          return;
        }

        var href = link.getAttribute("href") || "";

        if (href.indexOf("/assets/cv.pdf") === -1 && href.indexOf("assets/cv.pdf") === -1) {
          return;
        }

        sendEvent("cv_click", {
          link_url: link.href,
          link_text: cleanText(link.getAttribute("aria-label") || link.getAttribute("title") || link.textContent),
          page_path: window.location.pathname,
          transport_type: "beacon"
        });
      }

      function trackScrollDepth() {
        var pageHeight = Math.max(
          document.body.scrollHeight,
          document.documentElement.scrollHeight,
          document.body.offsetHeight,
          document.documentElement.offsetHeight
        );
        var viewportBottom = window.scrollY + window.innerHeight;
        var depth = Math.min(100, Math.round((viewportBottom / pageHeight) * 100));

        scrollThresholds.forEach(function (threshold) {
          if (depth >= threshold && !sentScrollDepths[threshold]) {
            sentScrollDepths[threshold] = true;
            sendEvent("scroll_depth", {
              scroll_percent: threshold,
              page_path: window.location.pathname,
              transport_type: "beacon"
            });
          }
        });
      }

      function trackSectionViews() {
        if (!("IntersectionObserver" in window)) {
          return;
        }

        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            var id = entry.target.id || "unknown";

            if (entry.isIntersecting && !sentSections[id]) {
              sentSections[id] = true;
              sendEvent("section_view", {
                section_id: id,
                section_title: cleanText(entry.target.querySelector("h2") ? entry.target.querySelector("h2").textContent : id),
                page_path: window.location.pathname,
                transport_type: "beacon"
              });
            }
          });
        }, { threshold: 0.5 });

        document.querySelectorAll("main section[id]").forEach(function (section) {
          observer.observe(section);
        });
      }

      function initAnalyticsEvents() {
        sendUtmLanding();
        trackSectionViews();
        trackScrollDepth();

        document.addEventListener("click", trackCvClick);
        window.addEventListener("scroll", trackScrollDepth, { passive: true });
        window.addEventListener("resize", trackScrollDepth);
        window.addEventListener("load", trackScrollDepth);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initAnalyticsEvents, { once: true });
      } else {
        initAnalyticsEvents();
      }
    })();
  </script>
{% endif %}
