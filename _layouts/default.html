<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4efe7" />
    <script>
      document.documentElement.classList.add("enhanced");
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&family=Source+Sans+3:wght@400;500;600&display=swap"
    />
    <link rel="preload" href="{{ '/assets/css/main.css' | relative_url }}" as="style" />
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    {% seo %}
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "@id": "{{ site.url }}/#person",
        "name": "{{ site.author.name }}",
        "alternateName": [
          "{{ site.author.full_name }}"
        ],
        "url": "{{ site.url }}/",
        "image": "{{ site.url }}/artifacts/portrait.jpeg",
        "description": {{ site.description | jsonify }},
        "jobTitle": "PhD Student at ETH AI Center",
        "affiliation": {
          "@type": "Organization",
          "name": "ETH AI Center"
        },
        "worksFor": {
          "@type": "Organization",
          "name": "ETH AI Center"
        },
        "email": "mailto:{{ site.author.email }}",
        "knowsAbout": [
          "Machine learning",
          "AI safety",
          "Foundation models",
          "Privacy-preserving machine learning",
          "Causal inference"
        ],
        "sameAs": [
          "https://www.linkedin.com/in/{{ site.linkedin_username }}/",
          "https://scholar.google.es/citations?user={{ site.scholar_userid }}&hl=es",
          "https://twitter.com/{{ site.twitter_username }}",
          "https://github.com/{{ site.github_username }}"
        ]
      }
    </script>
  </head>
  <body>
    {{ content }}
  </body>
</html>
